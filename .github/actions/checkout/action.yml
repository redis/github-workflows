name: 'Checkout'
description: 'Wrapper around actions/checkout to centralize the pinned version'

inputs:
  fetch-depth:
    description: 'Number of commits to fetch. Use 0 for full history.'
    required: false
    default: '1'
  fetch-tags:
    description: 'Whether to fetch tags.'
    required: false
    default: 'false'
  token:
    description: 'Token used to fetch the repository.'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        fetch-depth: ${{ inputs.fetch-depth }}
        fetch-tags: ${{ inputs.fetch-tags }}
        token: ${{ inputs.token != '' && inputs.token || github.token }}
