name: Gradle Build Job

on:
  workflow_call:
    inputs:
      job-name:
        description: 'Display name for the job'
        default: 'Build and Test'
        required: false
        type: string
      java-version:
        description: 'Java version to use'
        default: '17'
        required: false
        type: string
      runs-on:
        description: 'Runner label to use for the job'
        default: 'ubuntu-latest'
        required: false
        type: string
      gradle-tasks:
        description: 'Gradle tasks to run'
        default: 'build'
        required: false
        type: string
      prepull-images:
        description: 'Space- or newline-separated container images to docker pull (with retries) before running Gradle. Useful for Testcontainers-based tests to avoid transient registry pull timeouts (e.g. the Ryuk reaper).'
        default: ''
        required: false
        type: string
      coverage-results-path:
        description: 'Optional JaCoCo XML report glob to publish from this job'
        default: ''
        required: false
        type: string
      coverage-report-name:
        description: 'Display name for the optional coverage report'
        default: 'Coverage'
        required: false
        type: string
      coverage-artifact-name:
        description: 'Artifact name for uploaded coverage reports'
        default: ''
        required: false
        type: string
      sonar-gradle-tasks:
        description: 'Optional SonarQube Cloud Gradle tasks to append to the build invocation when sonar-token is provided'
        default: ''
        required: false
        type: string
      sonar-project-key:
        description: 'Optional SonarQube Cloud project key'
        default: ''
        required: false
        type: string
      sonar-organization:
        description: 'Optional SonarQube Cloud organization key'
        default: ''
        required: false
        type: string
      sonar-host-url:
        description: 'SonarQube Cloud host URL'
        default: 'https://sonarcloud.io'
        required: false
        type: string
      sonar-region:
        description: 'Optional SonarQube Cloud region'
        default: ''
        required: false
        type: string
      sonar-quality-gate-wait:
        description: 'Optional value for sonar.qualitygate.wait'
        default: ''
        required: false
        type: string
      sonar-coverage-report-paths:
        description: 'Optional comma-separated JaCoCo XML report paths for SonarQube Cloud'
        default: ''
        required: false
        type: string
      aws-role-arn:
        description: 'AWS IAM role ARN for OIDC authentication'
        required: false
        type: string
      aws-region:
        description: 'AWS region (used with aws-role-arn or aws secrets)'
        default: 'us-east-1'
        required: false
        type: string
    secrets:
      aws-access-key-id:
        description: 'AWS access key ID (alternative to OIDC)'
        required: false
      aws-secret-access-key:
        description: 'AWS secret access key (alternative to OIDC)'
        required: false
      unlock-public-key:
        description: 'Base64-encoded Ed25519 public key for unlock token verification'
        required: false
      sonar-token:
        description: 'SonarQube Cloud analysis token'
        required: false

jobs:
  build:
    name: ${{ inputs.job-name }}
    runs-on: ${{ inputs.runs-on }}
    permissions:
      contents: read
      checks: write
      id-token: write

    steps:
      - name: Checkout code
        uses: redis/github-workflows/.github/actions/checkout@main

      - name: Setup Gradle
        uses: redis/github-workflows/.github/actions/setup-gradle@main
        with:
          java-version: ${{ inputs.java-version }}
          java-distribution: 'temurin'

      - name: Configure AWS credentials
        uses: redis/github-workflows/.github/actions/configure-aws@main
        with:
          aws-role-arn: ${{ inputs.aws-role-arn }}
          aws-access-key-id: ${{ secrets.aws-access-key-id }}
          aws-secret-access-key: ${{ secrets.aws-secret-access-key }}
          aws-region: ${{ inputs.aws-region }}

      - name: Pre-pull container images
        if: inputs.prepull-images != ''
        shell: bash
        env:
          PREPULL_IMAGES: ${{ inputs.prepull-images }}
        run: |
          set -euo pipefail
          read -r -a images <<< "$PREPULL_IMAGES"
          max_attempts=5
          for image in "${images[@]}"; do
            echo "::group::Pulling $image"
            attempt=1
            until docker pull "$image"; do
              if [ "$attempt" -ge "$max_attempts" ]; then
                echo "::error::Failed to pull $image after $max_attempts attempts"
                exit 1
              fi
              delay=$((attempt * 10))
              echo "Pull of $image failed (attempt $attempt/$max_attempts); retrying in ${delay}s"
              sleep "$delay"
              attempt=$((attempt + 1))
            done
            echo "::endgroup::"
          done

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build, test, and analyze
        env:
          GRADLE_TASKS: ${{ inputs.gradle-tasks }}
          SONAR_GRADLE_TASKS: ${{ inputs.sonar-gradle-tasks }}
          UNLOCK_PUBLIC_KEY: ${{ secrets.unlock-public-key }}
          SONAR_TOKEN: ${{ secrets.sonar-token }}
          SONAR_PROJECT_KEY: ${{ inputs.sonar-project-key }}
          SONAR_ORGANIZATION: ${{ inputs.sonar-organization }}
          SONAR_HOST_URL: ${{ inputs.sonar-host-url }}
          SONAR_REGION: ${{ inputs.sonar-region }}
          SONAR_QUALITY_GATE_WAIT: ${{ inputs.sonar-quality-gate-wait }}
          SONAR_COVERAGE_REPORT_PATHS: ${{ inputs.sonar-coverage-report-paths }}
        shell: bash
        run: |
          read -r -a gradle_args <<< "$GRADLE_TASKS"
          read -r -a sonar_gradle_args <<< "$SONAR_GRADLE_TASKS"

          if [[ -n "$SONAR_GRADLE_TASKS" && -n "$SONAR_TOKEN" ]]; then
            ./gradlew "${gradle_args[@]}" "${sonar_gradle_args[@]}"
          else
            if [[ -n "$SONAR_GRADLE_TASKS" ]]; then
              echo "::notice::Skipping SonarQube Cloud analysis because sonar-token was not provided."
            fi
            ./gradlew "${gradle_args[@]}"
          fi

      - name: Upload test results
        if: always()
        uses: redis/github-workflows/.github/actions/upload-artifact@main
        with:
          name: test-results-${{ inputs.job-name }}
          path: |
            **/build/reports/tests/
            **/build/test-results/
          if-no-files-found: ignore

      - name: Detect JUnit XML results
        if: always()
        id: junit-results
        shell: bash
        run: |
          shopt -s globstar nullglob
          files=(**/build/test-results/**/*.xml)
          if [ ${#files[@]} -gt 0 ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish JUnit test report
        if: always() && steps.junit-results.outputs.found == 'true'
        uses: redis/github-workflows/.github/actions/test-reporter@main
        with:
          name: Gradle Test Results (${{ inputs.job-name }})
          path: '**/build/test-results/**/*.xml'
          reporter: java-junit
          fail-on-error: false

      - name: Detect coverage results
        if: always() && inputs.coverage-results-path != ''
        id: coverage-results
        shell: bash
        run: |
          shopt -s globstar nullglob
          files=(${{ inputs.coverage-results-path }})
          if [ ${#files[@]} -gt 0 ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish coverage summary
        if: always() && inputs.coverage-results-path != '' && steps.coverage-results.outputs.found == 'true'
        shell: bash
        run: |
          shopt -s globstar nullglob
          files=(${{ inputs.coverage-results-path }})
          if [ ${#files[@]} -eq 0 ]; then
            exit 0
          fi
          printf '%s\n' "${files[@]}" > coverage-files.txt
          python3 - <<'PY'
          import os
          import xml.etree.ElementTree as ET
          from pathlib import Path

          files = [
              Path(line.strip())
              for line in Path("coverage-files.txt").read_text(encoding="utf-8").splitlines()
              if line.strip()
          ]
          counters = {}
          for file in files:
              root = ET.parse(file).getroot()
              for counter in root.findall("counter"):
                  counter_type = counter.attrib["type"]
                  missed = int(counter.attrib["missed"])
                  covered = int(counter.attrib["covered"])
                  existing = counters.get(counter_type, (0, 0))
                  counters[counter_type] = (existing[0] + missed, existing[1] + covered)

          def pct(counter_type):
              missed, covered = counters.get(counter_type, (0, 0))
              total = missed + covered
              return "n/a" if total == 0 else f"{covered / total * 100:.2f}%"

          summary = "\n".join([
              f"## {os.environ['COVERAGE_REPORT_NAME']}",
              "",
              "| Metric | Coverage |",
              "| --- | ---: |",
              f"| Instructions | {pct('INSTRUCTION')} |",
              f"| Lines | {pct('LINE')} |",
              f"| Branches | {pct('BRANCH')} |",
          ])

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as fh:
              fh.write(summary + "\n")
          PY
        env:
          COVERAGE_REPORT_NAME: ${{ inputs.coverage-report-name }}

      - name: Upload coverage reports
        if: always() && inputs.coverage-results-path != '' && inputs.coverage-artifact-name != ''
        uses: redis/github-workflows/.github/actions/upload-artifact@main
        with:
          name: ${{ inputs.coverage-artifact-name }}
          path: |
            ${{ inputs.coverage-results-path }}
            **/build/reports/jacoco/**/html/
          if-no-files-found: ignore

      - name: Upload build diagnostics
        if: always()
        uses: redis/github-workflows/.github/actions/upload-artifact@main
        with:
          name: build-diagnostics-${{ inputs.job-name }}
          path: |
            **/build/reports/problems/
            **/build/reports/tests/
            **/build/test-results/
            **/build/reports/checkstyle/
            **/build/reports/pmd/
          if-no-files-found: ignore
