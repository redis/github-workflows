name: Gradle Build

on:
  workflow_call:
    inputs:
      split-jobs:
        description: 'Run the build as separate lint, unit, integration, and package jobs'
        default: false
        required: false
        type: boolean
      job-name:
        description: 'Display name for the job'
        default: 'Build and Test'
        required: false
        type: string
      java-version:
        description: 'Java version to use'
        default: '17'
        required: false
        type: string
      runs-on:
        description: 'Runner label to use for the job'
        default: 'ubuntu-latest'
        required: false
        type: string
      gradle-tasks:
        description: 'Gradle tasks to run for the legacy single-job path'
        default: 'build'
        required: false
        type: string
      coverage-results-path:
        description: 'Optional JaCoCo XML report glob to publish from the legacy single-job path'
        default: ''
        required: false
        type: string
      lint-gradle-tasks:
        description: 'Gradle tasks to run for lint and static analysis. Set to an empty string to disable this job when split-jobs is enabled.'
        default: '--parallel spotlessCheck pmdMain checkstyleMain'
        required: false
        type: string
      test-gradle-tasks:
        description: 'Gradle tasks to run for the default JVM test suite, typically `test`. Set to an empty string to disable this job when split-jobs is enabled.'
        default: '--parallel test'
        required: false
        type: string
      integration-gradle-tasks:
        description: 'Gradle tasks to run for additional JVM test suites, typically `integrationTest` from Gradle testing suites. Set to an empty string to disable this job when split-jobs is enabled.'
        default: '--parallel integrationTest'
        required: false
        type: string
      package-gradle-tasks:
        description: 'Gradle tasks to run for packaging and assembly verification. Set to an empty string to disable this job when split-jobs is enabled.'
        default: '--parallel assemble'
        required: false
        type: string
      prepull-images:
        description: 'Space- or newline-separated container images to docker pull (with retries) before running Gradle. Applied to the integration test job (and the legacy single-job path). Useful for Testcontainers-based tests to avoid transient registry pull timeouts (e.g. the Ryuk reaper).'
        default: ''
        required: false
        type: string
      unit-coverage-results-path:
        description: 'Optional JaCoCo XML report glob to publish from the unit test job'
        default: ''
        required: false
        type: string
      integration-coverage-results-path:
        description: 'Optional JaCoCo XML report glob to publish from the integration test job'
        default: ''
        required: false
        type: string
      coverage-artifact-prefix:
        description: 'Optional prefix for uploaded coverage artifacts from split test jobs'
        default: 'coverage-report'
        required: false
        type: string
      sonar-gradle-tasks:
        description: 'Optional SonarQube Cloud Gradle tasks appended to the legacy single-job build invocation when sonar-token is provided'
        default: ''
        required: false
        type: string
      sonar-project-key:
        description: 'Optional SonarQube Cloud project key'
        default: ''
        required: false
        type: string
      sonar-organization:
        description: 'Optional SonarQube Cloud organization key'
        default: ''
        required: false
        type: string
      sonar-host-url:
        description: 'SonarQube Cloud host URL'
        default: 'https://sonarcloud.io'
        required: false
        type: string
      sonar-region:
        description: 'Optional SonarQube Cloud region'
        default: ''
        required: false
        type: string
      sonar-quality-gate-wait:
        description: 'Optional value for sonar.qualitygate.wait'
        default: ''
        required: false
        type: string
      sonar-coverage-report-paths:
        description: 'Optional comma-separated JaCoCo XML report paths for SonarQube Cloud'
        default: ''
        required: false
        type: string
      aws-role-arn:
        description: 'AWS IAM role ARN for OIDC authentication (for integration tests)'
        required: false
        type: string
      aws-region:
        description: 'AWS region (used with aws-role-arn or aws secrets)'
        default: 'us-east-1'
        required: false
        type: string
    secrets:
      aws-access-key-id:
        description: 'AWS access key ID (alternative to OIDC)'
        required: false
      aws-secret-access-key:
        description: 'AWS secret access key (alternative to OIDC)'
        required: false
      unlock-public-key:
        description: 'Base64-encoded Ed25519 public key for unlock token verification'
        required: false
      sonar-token:
        description: 'SonarQube Cloud analysis token'
        required: false

jobs:
  build:
    if: ${{ !inputs.split-jobs }}
    uses: ./.github/workflows/reusable-build-job.yml
    with:
      job-name: ${{ inputs.job-name }}
      java-version: ${{ inputs.java-version }}
      runs-on: ${{ inputs.runs-on }}
      gradle-tasks: ${{ inputs.gradle-tasks }}
      prepull-images: ${{ inputs.prepull-images }}
      coverage-results-path: ${{ inputs.coverage-results-path }}
      coverage-report-name: 'Coverage'
      coverage-artifact-name: ${{ inputs.coverage-results-path != '' && format('{0}-all-tests', inputs.coverage-artifact-prefix) || '' }}
      sonar-gradle-tasks: ${{ inputs.sonar-gradle-tasks }}
      sonar-project-key: ${{ inputs.sonar-project-key }}
      sonar-organization: ${{ inputs.sonar-organization }}
      sonar-host-url: ${{ inputs.sonar-host-url }}
      sonar-region: ${{ inputs.sonar-region }}
      sonar-quality-gate-wait: ${{ inputs.sonar-quality-gate-wait }}
      sonar-coverage-report-paths: ${{ inputs.sonar-coverage-report-paths }}
      aws-role-arn: ${{ inputs.aws-role-arn }}
      aws-region: ${{ inputs.aws-region }}
    secrets:
      aws-access-key-id: ${{ secrets.aws-access-key-id }}
      aws-secret-access-key: ${{ secrets.aws-secret-access-key }}
      unlock-public-key: ${{ secrets.unlock-public-key }}
      sonar-token: ${{ secrets.sonar-token }}

  lint:
    if: ${{ inputs.split-jobs && inputs.lint-gradle-tasks != '' }}
    uses: ./.github/workflows/reusable-build-job.yml
    with:
      job-name: 'Lint And Static Analysis'
      java-version: ${{ inputs.java-version }}
      runs-on: ${{ inputs.runs-on }}
      gradle-tasks: ${{ inputs.lint-gradle-tasks }}
      aws-role-arn: ${{ inputs.aws-role-arn }}
      aws-region: ${{ inputs.aws-region }}
    secrets:
      aws-access-key-id: ${{ secrets.aws-access-key-id }}
      aws-secret-access-key: ${{ secrets.aws-secret-access-key }}
      unlock-public-key: ${{ secrets.unlock-public-key }}

  unit-tests:
    if: ${{ inputs.split-jobs && inputs.test-gradle-tasks != '' }}
    uses: ./.github/workflows/reusable-build-job.yml
    with:
      job-name: 'Unit Tests'
      java-version: ${{ inputs.java-version }}
      runs-on: ${{ inputs.runs-on }}
      gradle-tasks: ${{ inputs.test-gradle-tasks }}
      coverage-results-path: ${{ inputs.unit-coverage-results-path }}
      coverage-report-name: 'Unit Test Coverage'
      coverage-artifact-name: ${{ inputs.unit-coverage-results-path != '' && format('{0}-unit-tests', inputs.coverage-artifact-prefix) || '' }}
      aws-role-arn: ${{ inputs.aws-role-arn }}
      aws-region: ${{ inputs.aws-region }}
    secrets:
      aws-access-key-id: ${{ secrets.aws-access-key-id }}
      aws-secret-access-key: ${{ secrets.aws-secret-access-key }}
      unlock-public-key: ${{ secrets.unlock-public-key }}

  integration-tests:
    if: ${{ inputs.split-jobs && inputs.integration-gradle-tasks != '' }}
    uses: ./.github/workflows/reusable-build-job.yml
    with:
      job-name: 'Integration Tests'
      java-version: ${{ inputs.java-version }}
      runs-on: ${{ inputs.runs-on }}
      gradle-tasks: ${{ inputs.integration-gradle-tasks }}
      prepull-images: ${{ inputs.prepull-images }}
      coverage-results-path: ${{ inputs.integration-coverage-results-path }}
      coverage-report-name: 'Integration Test Coverage'
      coverage-artifact-name: ${{ inputs.integration-coverage-results-path != '' && format('{0}-integration-tests', inputs.coverage-artifact-prefix) || '' }}
      aws-role-arn: ${{ inputs.aws-role-arn }}
      aws-region: ${{ inputs.aws-region }}
    secrets:
      aws-access-key-id: ${{ secrets.aws-access-key-id }}
      aws-secret-access-key: ${{ secrets.aws-secret-access-key }}
      unlock-public-key: ${{ secrets.unlock-public-key }}

  package-verification:
    if: ${{ inputs.split-jobs && inputs.package-gradle-tasks != '' }}
    uses: ./.github/workflows/reusable-build-job.yml
    with:
      job-name: 'Package Verification'
      java-version: ${{ inputs.java-version }}
      runs-on: ${{ inputs.runs-on }}
      gradle-tasks: ${{ inputs.package-gradle-tasks }}
      aws-role-arn: ${{ inputs.aws-role-arn }}
      aws-region: ${{ inputs.aws-region }}
    secrets:
      aws-access-key-id: ${{ secrets.aws-access-key-id }}
      aws-secret-access-key: ${{ secrets.aws-secret-access-key }}
      unlock-public-key: ${{ secrets.unlock-public-key }}
