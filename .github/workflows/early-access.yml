name: Early Access Release

on:
  workflow_call:
    inputs:
      java-version:
        description: 'Java version to use'
        default: '17'
        required: false
        type: string
      gradle-artifact-tasks:
        description: 'Gradle tasks that assemble the artifacts JReleaser will publish. Prefer this over gradle-build-tasks.'
        default: ''
        required: false
        type: string
      gradle-build-tasks:
        description: 'Deprecated: Gradle tasks to run before JReleaser. Prefer gradle-artifact-tasks.'
        default: 'build'
        required: false
        type: string
      jreleaser-version:
        description: 'JReleaser version to use'
        default: 'latest'
        required: false
        type: string
      runs-on:
        description: 'Runner to use for the release job'
        default: 'ubuntu-latest'
        required: false
        type: string
      skip-tests:
        description: 'Skip tests during build (adds -x test flag to Gradle)'
        default: true
        required: false
        type: boolean
    secrets:
      git-access-token:
        description: 'GitHub token with write access'
        required: true
      gpg-passphrase:
        description: 'GPG passphrase for signing'
        required: true
      gpg-public-key:
        description: 'GPG public key'
        required: true
      gpg-secret-key:
        description: 'GPG secret key'
        required: true
      slack-webhook:
        description: 'Slack webhook URL for notifications'
        required: false
      docker-username:
        description: 'Docker registry username (for bootBuildImage)'
        required: false
      docker-password:
        description: 'Docker registry password (for bootBuildImage)'
        required: false
      unlock-public-key:
        description: 'Base64-encoded Ed25519 public key for unlock token verification'
        required: false

jobs:
  early-access:
    runs-on: ${{ inputs.runs-on }}
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: redis/github-workflows/.github/actions/checkout@main
        with:
          fetch-depth: 0
          token: ${{ secrets.git-access-token }}

      - name: Setup Gradle
        uses: redis/github-workflows/.github/actions/setup-gradle@main
        with:
          java-version: ${{ inputs.java-version }}

      - name: Get Snapshot Version
        id: version
        run: |
          VERSION=$(./gradlew currentVersion -q | grep "Project version:" | awk '{print $3}')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Snapshot version: $VERSION"

      - name: Resolve Gradle Tasks
        id: gradle-tasks
        run: |
          if [ -n "${{ inputs.gradle-artifact-tasks }}" ]; then
            echo "tasks=${{ inputs.gradle-artifact-tasks }}" >> "$GITHUB_OUTPUT"
          else
            echo "tasks=${{ inputs.gradle-build-tasks }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Assemble Artifacts
        env:
          DOCKER_USERNAME: ${{ secrets.docker-username }}
          DOCKER_PASSWORD: ${{ secrets.docker-password }}
          UNLOCK_PUBLIC_KEY: ${{ secrets.unlock-public-key }}
        run: ./gradlew ${{ steps.gradle-tasks.outputs.tasks }} ${{ inputs.skip-tests && '-x test -x integrationTest' || '' }}

      - name: Set up Docker Buildx
        uses: redis/github-workflows/.github/actions/setup-buildx@main

      - name: Release with JReleaser
        uses: redis/github-workflows/.github/actions/jreleaser@main
        with:
          version: ${{ steps.version.outputs.version }}
          git-access-token: ${{ secrets.git-access-token }}
          gpg-secret-key: ${{ secrets.gpg-secret-key }}
          gpg-public-key: ${{ secrets.gpg-public-key }}
          gpg-passphrase: ${{ secrets.gpg-passphrase }}
          slack-webhook: ${{ secrets.slack-webhook }}
          docker-username: ${{ secrets.docker-username }}
          docker-password: ${{ secrets.docker-password }}
          jreleaser-version: ${{ inputs.jreleaser-version }}
