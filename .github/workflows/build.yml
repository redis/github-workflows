name: Gradle Build (Simple)

on:
  workflow_call:
    inputs:
      java-version:
        description: 'Java version to use'
        default: '17'
        required: false
        type: string
      gradle-tasks:
        description: 'Gradle tasks to run'
        default: 'build'
        required: false
        type: string
      aws-role-arn:
        description: 'AWS IAM role ARN for OIDC authentication (for integration tests)'
        required: false
        type: string
      aws-region:
        description: 'AWS region (used with aws-role-arn or aws secrets)'
        default: 'us-east-1'
        required: false
        type: string
    secrets:
      aws-access-key-id:
        description: 'AWS access key ID (alternative to OIDC)'
        required: false
      aws-secret-access-key:
        description: 'AWS secret access key (alternative to OIDC)'
        required: false

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      id-token: write  # Required for OIDC

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: ${{ inputs.java-version }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: Configure AWS credentials
        uses: redis/github-workflows/.github/actions/configure-aws@main
        with:
          aws-role-arn: ${{ inputs.aws-role-arn }}
          aws-access-key-id: ${{ secrets.aws-access-key-id }}
          aws-secret-access-key: ${{ secrets.aws-secret-access-key }}
          aws-region: ${{ inputs.aws-region }}

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build and test
        run: ./gradlew ${{ inputs.gradle-tasks }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: |
            **/build/reports/tests/
            **/build/test-results/
          if-no-files-found: ignore

      - name: Publish JUnit test report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Gradle Test Results
          path: '**/build/test-results/test/*.xml'
          reporter: java-junit
          fail-on-error: false

      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: build-diagnostics
          path: |
            **/build/reports/problems/
            **/build/reports/tests/test/
            **/build/test-results/test/
          if-no-files-found: ignore
