name: 'Update Antora Version'
description: 'Update docs/antora.yml version to match release version'

inputs:
  version:
    description: 'Version to set in antora.yml'
    required: true
  display-version:
    description: 'Optional display_version to set in antora.yml'
    required: false
  prerelease:
    description: 'Optional prerelease value to set in antora.yml'
    required: false
  git-access-token:
    description: 'GitHub token for pushing changes'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Update Antora documentation version
      shell: bash
      env:
        RELEASE_VERSION: ${{ inputs.version }}
        DISPLAY_VERSION: ${{ inputs.display-version }}
        PRERELEASE: ${{ inputs.prerelease }}
        GITHUB_TOKEN: ${{ inputs.git-access-token }}
      run: |
        # Checkout main branch
        git checkout main
        git pull origin main
        
        # Check if docs/antora.yml exists
        if [ ! -f "docs/antora.yml" ]; then
          echo "docs/antora.yml not found, skipping version update"
          exit 0
        fi
        
        # Update version in antora.yml
        sed -i.bak "s/^version:.*/version: $RELEASE_VERSION/" docs/antora.yml
        rm -f docs/antora.yml.bak

        if [ -n "$DISPLAY_VERSION" ]; then
          if grep -q '^display_version:' docs/antora.yml; then
            sed -i.bak "s/^display_version:.*/display_version: $DISPLAY_VERSION/" docs/antora.yml
            rm -f docs/antora.yml.bak
          else
            printf '\ndisplay_version: %s\n' "$DISPLAY_VERSION" >> docs/antora.yml
          fi
        fi

        if [ -n "$PRERELEASE" ]; then
          if grep -q '^prerelease:' docs/antora.yml; then
            sed -i.bak "s/^prerelease:.*/prerelease: $PRERELEASE/" docs/antora.yml
            rm -f docs/antora.yml.bak
          else
            printf '\nprerelease: %s\n' "$PRERELEASE" >> docs/antora.yml
          fi
        fi
        
        # Check if there are changes
        if git diff --quiet docs/antora.yml; then
          echo "No changes to docs/antora.yml"
          exit 0
        fi
        
        # Commit and push
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add docs/antora.yml
        git commit -m "docs: update Antora version to $RELEASE_VERSION"
        git push origin main
        
        echo "Updated docs/antora.yml to version $RELEASE_VERSION"
